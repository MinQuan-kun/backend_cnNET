syntax = "proto3";

option csharp_namespace = "GK_CNNET";

service GameGrpc {
  rpc GetAllGames (GameEmptyRequest) returns (GameList);
  rpc CreateGame (CreateGameRequest) returns (GameModel);
  rpc UpdateGame (UpdateGameRequest) returns (GameModel);
  rpc DeleteGame (GameDeleteRequest) returns (GameDeleteResponse);
}

message GameEmptyRequest {}

message GameModel {
  string id = 1;
  string name = 2;
  int64 price = 3;
  string image = 4;
  string platform = 5;
  string download_link = 6;
  string description = 7;
}

message CreateGameRequest {
  string name = 1;
  int64 price = 2; 
  repeated string category_ids = 3; 
  repeated string platforms = 4;   
  string image = 5;                
  string description = 6;
  string download_link = 7;        
}

message UpdateGameRequest {
  string id = 1;
  string name = 2;
  int64 price = 3;
  string image = 4;
  string download_link = 5; 
  string platform = 6;
  string description = 7;
}

message GameList {
  repeated GameModel items = 1;
}

message GameDeleteRequest {
  string id = 1;
}

message GameDeleteResponse {
  bool success = 1;
}
